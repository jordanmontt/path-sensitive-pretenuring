default_experiment: all
default_data_file: 'experiment.csv'

# a set of suites with different benchmarks and possibly different settings
benchmark_suites:
    CormasExecution:
        gauge_adapter: PlainSecondsLog
        command: |-
            eval "%(benchmark)s"
        input_sizes: [1]
        invocations: 30
        benchmarks:
            - "VeritasCormas new run"
    DataFrameExecution:
        gauge_adapter: PlainSecondsLog
        command: |-
            eval "%(benchmark)s"
        input_sizes: [1]
        invocations: 30
        benchmarks:
            - "VeritasDataFrame new run"
    MooseExecution:
        gauge_adapter: PlainSecondsLog
        command: |-
            eval "%(benchmark)s"
        input_sizes: [1]
        invocations: 30
        benchmarks:
            - "VeritasMoose new run"
    MicrodownExecution:
        gauge_adapter: PlainSecondsLog
        command: |-
            eval "%(benchmark)s"
        input_sizes: [1]
        invocations: 30
        benchmarks:
            - "VeritasMicrodown new run"
# a set of executables for the benchmark execution
executors:
    ExecutorBaselineCormas:
        path: "."
        executable: "reBenchRunner.sh"
        args: "./baseimage/pharo-vm/pharo --headless ./cormas/cormas.image --no-default-preferences"
    ExecutorCormasApplicationMethod:
        path: "."
        executable: "reBenchRunner.sh"
        args: "./baseimage/pharo-vm/pharo --headless ./cormas-applicationMethod/cormas-applicationMethod.image --no-default-preferences"
    ExecutorCormasLocationOfNew:
        path: "."
        executable: "reBenchRunner.sh"
        args: "./baseimage/pharo-vm/pharo --headless ./cormas-locationOfNew/cormas-locationOfNew.image --no-default-preferences"
    ExecutorCormasCallerOfNew:
        path: "."
        executable: "reBenchRunner.sh"
        args: "./baseimage/pharo-vm/pharo --headless ./cormas-callerOfNew/cormas-callerOfNew.image --no-default-preferences"
    #
    ExecutorBaselineDataFrame:
        path: "."
        executable: "reBenchRunner.sh"
        args: "./baseimage/pharo-vm/pharo --headless ./dataframe/dataframe.image --no-default-preferences"
    ExecutorDataFrameApplicationMethod:
        path: "."
        executable: "reBenchRunner.sh"
        args: "./baseimage/pharo-vm/pharo --headless ./dataframe-applicationMethod/dataframe-applicationMethod.image --no-default-preferences"
    ExecutorDataFrameLocationOfNew:
        path: "."
        executable: "reBenchRunner.sh"
        args: "./baseimage/pharo-vm/pharo --headless ./dataframe-locationOfNew/dataframe-locationOfNew.image --no-default-preferences"
    ExecutorDataFrameCallerOfNew:
        path: "."
        executable: "reBenchRunner.sh"
        args: "./baseimage/pharo-vm/pharo --headless ./dataframe-callerOfNew/dataframe-callerOfNew.image --no-default-preferences"
    #
    ExecutorBaselineMicrodown:
        path: "."
        executable: "reBenchRunner.sh"
        args: "./baseimage/pharo-vm/pharo --headless ./microdown/microdown.image --no-default-preferences"
    ExecutorMicrodownApplicationMethod:
        path: "."
        executable: "reBenchRunner.sh"
        args: "./baseimage/pharo-vm/pharo --headless ./microdown-applicationMethod/microdown-applicationMethod.image --no-default-preferences"
    ExecutorMicrodownLocationOfNew:
        path: "."
        executable: "reBenchRunner.sh"
        args: "./baseimage/pharo-vm/pharo --headless ./microdown-locationOfNew/microdown-locationOfNew.image --no-default-preferences"
    ExecutorMicrodownCallerOfNew:
        path: "."
        executable: "reBenchRunner.sh"
        args: "./baseimage/pharo-vm/pharo --headless ./microdown-callerOfNew/microdown-callerOfNew.image --no-default-preferences"
    #
    ExecutorBaselineMoose:
        path: "."
        executable: "reBenchRunner.sh"
        args: "./baseimage/pharo-vm/pharo --headless ./moose/moose.image --no-default-preferences"
    ExecutorMooseApplicationMethod:
        path: "."
        executable: "reBenchRunner.sh"
        args: "./baseimage/pharo-vm/pharo --headless ./moose-applicationMethod/moose-applicationMethod.image --no-default-preferences"
    ExecutorMooseLocationOfNew:
        path: "."
        executable: "reBenchRunner.sh"
        args: "./baseimage/pharo-vm/pharo --headless ./moose-locationOfNew/moose-locationOfNew.image --no-default-preferences"
    ExecutorMooseCallerOfNew:
        path: "."
        executable: "reBenchRunner.sh"
        args: "./baseimage/pharo-vm/pharo --headless ./moose-callerOfNew/moose-callerOfNew.image --no-default-preferences"
# combining benchmark suites and executions
experiments:
    Cormas:
        suites:
          - CormasExecution
        executions:
          - ExecutorBaselineCormas
          - ExecutorCormasApplicationMethod
          - ExecutorCormasLocationOfNew
          - ExecutorCormasCallerOfNew
    #
    DataFrame:
        suites:
          - DataFrameExecution
        executions:
          - ExecutorBaselineDataFrame
          - ExecutorDataFrameApplicationMethod
          - ExecutorDataFrameLocationOfNew
          - ExecutorDataFrameCallerOfNew
    #
    Microdown:
        suites:
          - MicrodownExecution
        executions:
          - ExecutorBaselineMicrodown
          - ExecutorMicrodownApplicationMethod
          - ExecutorMicrodownLocationOfNew
          - ExecutorMicrodownCallerOfNew
    #
    Moose:
        suites:
          - MooseExecution
        executions:
          - ExecutorBaselineMoose
          - ExecutorMooseApplicationMethod
          - ExecutorMooseLocationOfNew
          - ExecutorMooseCallerOfNew